name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: specular-telemetry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Validate local detector
        run: |
          python3 -m compileall local
          python3 -m unittest discover -s local/tests -v

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Validate edge Worker
        working-directory: worker
        run: |
          npm ci
          npm run lint
          npm test

      - name: Notify #ci-cd
        if: always() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          STATUS: ${{ job.status }}
        run: |
          if [ -z "${WEBHOOK:-}" ]; then
            echo "no webhook secret; skipping"
            exit 0
          fi
          if [ "$STATUS" = "success" ]; then
            COLOUR=4906624
            ICON="green"
          else
            COLOUR=14830410
            ICON="red"
          fi
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg icon "$ICON" \
            --arg status "$STATUS" \
            --arg run_url "$RUN_URL" \
            --argjson colour "$COLOUR" \
            '{
              username: "ci-cd",
              embeds: [{
                title: "specular-telemetry CI",
                description: ($icon + " detector tests + Worker tests: " + $status),
                color: $colour,
                fields: [{name: "Run", value: ("[logs](" + $run_url + ")"), inline: true}],
                footer: {text: "Atlas Systems — Pipeline"}
              }]
            }')
          curl -sS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
