name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: specular-telemetry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Validate local detector
        run: |
          python3 -m compileall local
          python3 -m unittest discover -s local/tests -v

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Validate edge Worker
        working-directory: worker
        run: |
          npm ci
          npm run lint
          npm test
          npx wrangler deploy --dry-run --outdir dist

      - name: Check out pinned Atlas Infra Worker contract validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: f971172dc258c93dffa53b8b7a3532c5be55883d
          path: .atlas-infra-contracts
          persist-credentials: false

      - name: Validate bundled Worker metadata contract
        run: |
          python3 .atlas-infra-contracts/scripts/worker_contract.py check \
            --bundle-dir worker/dist \
            --require-meta

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: build
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.build.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
