name: Deploy

on:
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: deploy-specular-edge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: AtlasReaper311/atlas-infra/.github/workflows/deploy-worker.yml@093df3f87fa4e068155455f82c9b69bffad76fb6 # atlas-infra main
    with:
      worker_name: specular-edge
      working_directory: worker
      run_lint: true
      run_tests: true
    secrets: inherit
