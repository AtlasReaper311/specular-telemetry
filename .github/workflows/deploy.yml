name: Deploy

on:
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: deploy-specular-edge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: AtlasReaper311/atlas-infra/.github/workflows/deploy-worker.yml@f971172dc258c93dffa53b8b7a3532c5be55883d # atlas-infra W3 Worker contract enforcement
    with:
      worker_name: specular-edge
      working_directory: worker
      run_lint: true
      run_tests: true
      require_meta: true
    secrets: inherit
