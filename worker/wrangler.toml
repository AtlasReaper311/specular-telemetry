# specular-edge // Cloudflare Worker configuration
name = "specular-edge"
main = "src/index.js"
compatibility_date = "2026-06-01"
workers_dev = false

routes = [
  { pattern = "api.atlas-systems.uk/specular*", zone_id = "8ba6350a78c988447c111048b125f917" }
]

[observability]
enabled = true

[[kv_namespaces]]
binding = "TELEMETRY_KV"
id = "3b033fc37ca14e7c9fb1559ecd6430b1"

[[services]]
binding = "ATLAS_NOTIFY"
service = "atlas-notify"

[vars]
TUNNEL_ORIGIN = "https://specular-tunnel.atlas-systems.uk"
ALLOWED_ORIGINS = "https://atlas-systems.uk,https://www.atlas-systems.uk,http://localhost:8788"
CACHE_TTL_SECONDS = "60"
OFFLINE_CACHE_TTL_SECONDS = "30"
KV_MIN_WRITE_INTERVAL_SECONDS = "600"
TUNNEL_TIMEOUT_MS = "5000"
# Fail closed. The hidden control route is absent unless the secret binding
# CHAOS_ENABLED is set to the literal value true for an approved window.

# Secrets, entered only through approved local prompts:
#   npx wrangler secret put CHAOS_ENABLED
#   npx wrangler secret put CHAOS_TOKEN
#   npx wrangler secret put NOTIFY_TOKEN
